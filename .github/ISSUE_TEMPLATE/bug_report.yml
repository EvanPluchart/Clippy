name: Bug report
description: Report a reproducible problem in Clippy
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Clippy. Never paste real private clipboard content into an issue.
  - type: input
    id: version
    attributes:
      label: Clippy version
      placeholder: "1.2.0 (6)"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version and Mac
      placeholder: "macOS 15.5, Apple silicon"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Copy…
        2. Press…
        3. Select…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: accessibility
    attributes:
      label: Accessibility permission
      options:
        - Authorized
        - Not authorized
        - Not applicable
        - Unsure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Attach sanitized screenshots or crash reports if useful.
