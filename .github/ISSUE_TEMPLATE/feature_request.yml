name: Feature request
description: Suggest a focused improvement for Clippy
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: This proposal can work without sending clipboard content off the Mac.
          required: true
