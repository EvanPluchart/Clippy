name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify generated Xcode project
        run: |
          ruby scripts/generate_xcodeproj.rb
          git diff --exit-code -- Clippy.xcodeproj

      - name: Run strict Swift tests
        run: swift test -Xswiftc -strict-concurrency=complete -Xswiftc -warnings-as-errors

      - name: Analyze the macOS target
        run: |
          xcodebuild \
            -project Clippy.xcodeproj \
            -target Clippy \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            analyze

      - name: Build the universal Release app
        run: |
          xcodebuild \
            -project Clippy.xcodeproj \
            -scheme Clippy \
            -configuration Release \
            -derivedDataPath dist/DerivedData-CI \
            -destination 'generic/platform=macOS' \
            ARCHS='arm64 x86_64' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Validate French and English localizations
        run: ruby scripts/validate_localizations.rb dist/DerivedData-CI/Build/Intermediates.noindex

      - name: Validate distribution tooling
        run: |
          bash -n scripts/create_dmg.sh scripts/release.sh scripts/release_unsigned.sh scripts/verify_dmg.sh
          osacompile -o /tmp/clippy-configure-dmg.scpt scripts/configure_dmg.applescript
          ruby -c Packaging/Casks/clippy.rb.template
          ruby -c Packaging/Casks/clippy-unsigned.rb.template
          swift scripts/render_dmg_background.swift \
            Packaging/DMG/background-source.png \
            /tmp/clippy-dmg-background
          cmp Packaging/DMG/background.png /tmp/clippy-dmg-background/background.png
          cmp Packaging/DMG/background@2x.png /tmp/clippy-dmg-background/background@2x.png
